aid: searoutes
name: Searoutes
review:
  question: Does Searoutes expose a documented public WebSocket API?
  answer: false
  date: '2026-07-03'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Every Searoutes API surface documented at
    developer.searoutes.com is request/response REST over HTTPS served from
    https://api.searoutes.com and authenticated with an x-api-key header. Even
    the real-time-flavored data (AIS vessel positions, ETAs, current weather) is
    delivered by polling REST endpoints such as /vessel/v2/position and
    /weather/v2/, not by a server-push transport. There is no documented
    WebSocket (ws:// or wss://) or SSE endpoint on Searoutes' API to model.
findings:
  summary: |
    Searoutes does not publish a documented public WebSocket API. Searoutes is a
    maritime routing and carbon-emissions platform whose public product is a set
    of REST APIs served from https://api.searoutes.com and authenticated with an
    x-api-key request header. The documented surfaces are Ocean Routing
    (/route/v2/sea/...), Geocoding (/geocoding/v2/...), CO2 Emissions
    (/co2/v2/...), Vessel/AIS (/vessel/v2/...), Search & Carriers
    (/search/v2/...), and Weather (/weather/v2/...). All are synchronous
    request/response REST over HTTPS. Near-real-time data (latest vessel
    position, ETA, current weather) is obtained by calling REST endpoints, not
    by subscribing to a stream. No WebSocket or SSE endpoint is documented.
  openSource: |
    The core Searoutes routing/emissions engine is a commercial hosted API and
    is not open source. Searoutes maintains a public GitHub organization
    (github.com/searoutes) with example/client repositories (for example
    "examples" and "vessel-destination-map") that call the hosted API, but the
    routing, AIS, and CO2 computation services themselves are proprietary and
    accessed only via the paid API.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.searoutes.com
      documented: true
      note: All Ocean Routing, Geocoding, CO2, Vessel, Search, and Weather endpoints. Auth via x-api-key header.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in the Searoutes API reference or llms.txt as of the review date.
    - protocol: SSE
      scheme: https
      documented: false
      note: No Server-Sent Events surface is documented; real-time-flavored data is polled over REST.
