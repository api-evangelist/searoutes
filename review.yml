        Endpoint paths above are taken from the published Searoutes developer
        documentation and the developer.searoutes.com/llms.txt reference index
        (confirmed as documented). Individual request/response field schemas in
        the OpenAPI are summarized rather than exhaustively enumerated, since the
        full JSON schemas are only visible behind an authenticated key.
sources:
  - url: https://developer.searoutes.com/reference/introduction
    type: Documentation
    note: API overview listing Carbon Emissions, Geocoding, Ocean Routing, Search, Vessel, and Weather collections.
  - url: https://developer.searoutes.com/reference/intro/authentication
    type: Documentation
    note: Base URL https://api.searoutes.com and x-api-key header auth; 7-day/100-call trial keys.
  - url: https://developer.searoutes.com/reference/getsearoute
    type: APIReference
    note: GET /route/v2/sea/{locations} returning distance (m), duration (ms), and crossed areas.
  - url: https://developer.searoutes.com/llms.txt
    type: Reference
    note: Machine-readable index enumerating all v2 endpoint paths across the six API collections.
  - url: https://searoutes.com/pricing/
    type: Pricing
    note: Annual subscription bundles - Ocean Routing from EUR 400/mo, Vessel Tracking from EUR 300/mo, Carbon Emissions custom.
  - url: https://github.com/searoutes
    type: SourceCode
    note: Public GitHub org with example clients; the core API service is proprietary/hosted.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket or other server-push protocol surface exists on Searoutes' API;
    every documented endpoint is request/response REST over HTTPS. No AsyncAPI
    document was created because there is no streaming transport on Searoutes'
    own API to model. The apis.yml catalogs the six REST API collections with an
    OpenAPI, Postman collection, and Open Collection.
