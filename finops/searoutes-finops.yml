meters:
- name: ocean_routing_calls
  description: Calls to the Ocean Routing and geocoding endpoints, counted against the bundle's monthly allotment.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - api_key
  - product
- name: vessel_tracking_calls
  description: AIS vessel position, ETA, arrivals, trace, and time-series calls counted against the Vessel Tracking allotment.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - api_key
  - product
- name: carbon_emissions_calls
  description: Multimodal CO2e calculation calls counted against the Carbon Emissions allotment.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - api_key
  - product
- name: weather_calls
  description: Historical, real-time, and forecast weather calls.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - api_key
principles:
- name: Visibility
  description: Track monthly call consumption per API key against each bundle's included allotment to avoid surprise overages.
- name: Allocation
  description: Issue separate API keys per workload or team and map each to the product bundle and cost center it draws on.
- name: Optimization
  description: Cache stable results (port geocodes, static routes), batch shipment CO2e requests, and right-size the subscribed bundles and monthly volume to actual demand.
- name: Accountability
  description: Assign an owner per bundle and review annual subscription renewals against realized call volume.
