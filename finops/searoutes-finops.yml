description: >-
  FinOps view of Searoutes spend. Searoutes bills flat annual subscriptions per
  product bundle (Ocean Routing, Vessel Tracking, Carbon Emissions), each with
  an included monthly call allotment, plus custom enterprise agreements. There
  are no integration fees or variable per-call charges advertised; the primary
  cost driver is choosing the right bundles and monthly call volume, so cost
  control centers on quota allocation and avoiding redundant calls rather than
  per-token metering.
notes: >-
  Searoutes does not publish per-call overage rates or a usage-export format;
  the billing model is subscription-first. Confirm invoicing cadence, currency,
  and any overage terms with Searoutes during reconciliation.
