aid: searoutes
url: https://raw.githubusercontent.com/api-evangelist/searoutes/refs/heads/main/apis.yml
name: Searoutes
kind: company
description: Searoutes is a maritime routing and carbon-emissions API platform for
  logistics, freight forwarding, and supply-chain teams. Its REST APIs compute
  point-to-point, port-to-point, and port-to-port sea routes with distances and
  durations (including SECA, HRA, and ice-area avoidance), geocode ports, airports,
  and places, calculate multimodal CO2e emissions (sea, road, rail, air, inland
  waterway) using a GLEC-accredited methodology, track vessels via AIS (positions,
  ETAs, traces, arrivals), look up carriers and services, and return historical,
  real-time, and forecasted weather along routes. All APIs are served from
  https://api.searoutes.com and authenticated with an x-api-key header.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
